name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [main]
  schedule:
    - cron: "31 7 * * 3"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language:
          - typescript
          - actions

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        if: matrix.language == 'typescript'
        with:
          node-version-file: package.json

      - uses: pnpm/action-setup@v4
        if: matrix.language == 'typescript'

      - name: Initialize CodeQL (TypeScript)
        if: matrix.language == 'typescript'
        uses: github/codeql-action/init@v4
        with:
          config-file: .github/codeql/codeql-config.yml
          languages: ${{ matrix.language }}
          source-root: src

      - name: Initialize CodeQL (Actions)
        if: matrix.language == 'actions'
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        if: matrix.language == 'typescript'
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  cleanup:
    name: Cleanup stale analyses
    runs-on: ubuntu-latest
    needs: analyze
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      security-events: write
    steps:
      - name: Delete stale code scanning analyses
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Keep only the categories produced by the analyze job above.
          # Update these values if the category format in the analyze job changes.
          stale_ids=$(gh api --paginate \
            "repos/${{ github.repository }}/code-scanning/analyses?ref=refs/heads/main&per_page=100" \
            --jq '.[] | select(.category != "/language:typescript" and .category != "/language:actions") | .id')

          if [ -z "$stale_ids" ]; then
            echo "No stale analyses found."
          else
            while IFS= read -r id; do
              if [ -n "$id" ]; then
                echo "Deleting stale analysis $id"
                gh api --method DELETE \
                  "repos/${{ github.repository }}/code-scanning/analyses/${id}?confirm_delete=true" \
                  || echo "Warning: Failed to delete analysis ${id}"
              fi
            done <<< "$stale_ids"
          fi